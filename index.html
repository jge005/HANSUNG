<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매출 · 경리</title>
  <style>
    :root {
      --text: #4e4564;
      --text-dark: #4b3f66;
      --muted: #8b82a3;
      --muted2: #5f5677;
      --purple: #9e7cf6;
      --border: #eadff6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
      font-size: 14px;
      color: var(--text);
      color-scheme: light;
    }
    .hidden { display: none !important; }

    .shell-bg {
      min-height: 100vh;
      background: linear-gradient(180deg, #fff9ef 0%, #f8f1ff 48%, #eef6ff 100%);
      color: var(--text);
    }

    .login-wrap {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .panel {
      width: 420px;
      padding: 40px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 60px rgba(131, 103, 181, 0.15);
      backdrop-filter: blur(8px);
    }
    .field {
      height: 44px;
      width: 100%;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.92);
      padding: 0 16px;
      font-size: 13px;
      outline: none;
      color-scheme: light;
    }
    .field:focus {
      border-color: #c3a7ff;
      box-shadow: 0 0 0 2px #f1e8ff;
    }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .primary-btn {
      display: inline-flex;
      width: 100%;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: none;
      border-radius: 16px;
      padding: 10px 20px;
      font: inherit;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #d8b7ff, #9fd2ff);
      box-shadow: 0 10px 24px rgba(156, 126, 219, 0.24);
    }
    .soft-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: none;
      border-radius: 16px;
      padding: 8px 16px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }
    .soft-btn.active-filter {
      background: #ead9ff;
      color: var(--text-dark);
      box-shadow: 0 1px 4px rgba(156, 126, 219, 0.14);
    }
    .soft-btn.filter-apply-btn {
      background: linear-gradient(135deg, #e9dcff, #d8ecff);
      color: var(--text-dark);
      box-shadow: 0 4px 12px rgba(156, 126, 219, 0.12);
      font-weight: 700;
    }
    .soft-btn.filter-clear-btn {
      background: #fff;
      color: #8b82a3;
      border: 1px solid #eadff6;
      box-shadow: none;
      font-weight: 600;
    }
    .icon-box {
      display: inline-flex;
      width: 48px;
      height: 48px;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: #fff;
      box-shadow: 0 8px 24px rgba(131, 103, 181, 0.1);
    }
    .icon-box-sm {
      width: 44px;
      height: 44px;
      margin-bottom: 16px;
      border-radius: 16px;
      background: linear-gradient(135deg, #f8f0ff 0%, #eef7ff 100%);
      color: #8b72d9;
    }
    .title-lg { font-size: 20px; font-weight: 600; color: var(--text-dark); }
    .title-xl { font-size: 19px; font-weight: 600; letter-spacing: -0.02em; color: var(--text-dark); }
    .sub { font-size: 14px; color: var(--muted); }

    .role-grid {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      padding: 16px;
    }
    .role-card {
      min-width: 180px;
      border: none;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.88);
      padding: 32px;
      text-align: left;
      cursor: pointer;
      box-shadow: 0 10px 28px rgba(131, 103, 181, 0.1);
      transition: transform 0.15s, background 0.15s;
      font: inherit;
      color: inherit;
    }
    .role-card:hover {
      transform: translateY(-4px);
      background: #fff;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      padding: 16px;
    }
    .content { padding: 0 24px 24px; }
    .main-pick {
      display: flex;
      min-height: 70vh;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .main-card {
      min-width: 180px;
      border: none;
      border-radius: 16px;
      background: #fff;
      padding: 32px;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      transition: transform 0.15s;
      font: inherit;
      text-align: left;
    }
    .main-card:hover { transform: translateY(-4px); }
    .font-semibold { font-weight: 600; }

    .toolbar-card {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      padding: 16px;
      border-radius: 16px;
      background: #fff;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }
    .toolbar-card label { font-size: 14px; font-weight: 500; color: var(--muted2); }
    .toolbar-card select {
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 8px 12px;
      font-size: 14px;
      outline: none;
    }
    .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .sub-tab {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: none;
      border-radius: 16px;
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      background: #fff;
      color: #6a6082;
      font: inherit;
    }
    .sub-tab.active {
      background: #d8b4fe;
      color: var(--text-dark);
    }
    .empty-page {
      display: flex;
      height: 520px;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      background: #fff;
      color: #9ca3af;
    }
    .prep {
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    svg.icon { width: 20px; height: 20px; flex-shrink: 0; }

    /* Sales table */
    .st-wrap {
      position: relative;
      border-radius: 16px;
      background: #fff;
      padding: 16px;
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
    }
    .st-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: #6d6387;
      font-size: 12px;
    }
    .st-toolbar strong {
      color: var(--text-dark);
      font-weight: 700;
    }
    .st-scroll {
      max-height: 600px;
      overflow: auto;
      border-radius: 12px;
      border: 1px solid #e9def5;
      outline: none;
      user-select: none;
      background: #fff;
    }
    .st-scroll:focus {
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.25);
    }
    .st-table {
      width: max-content;
      min-width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    .st-table thead {
      background: linear-gradient(90deg, #fff8ea 0%, #f8f1ff 52%, #eef6ff 100%);
    }
    .st-table th {
      border: 1px solid var(--border);
      padding: 4px;
      text-align: center;
      font-weight: 600;
      color: #6d6387;
      background: linear-gradient(90deg, #fff8ea 0%, #f8f1ff 52%, #eef6ff 100%);
    }
    .st-col-head {
      position: sticky;
      top: 0;
      z-index: 14;
      min-width: 40px;
    }
    .st-corner {
      position: sticky;
      left: 0;
      top: 0;
      z-index: 18;
      width: 46px;
      min-width: 46px;
      background: linear-gradient(90deg, #fff8ea 0%, #f8f1ff 52%, #eef6ff 100%);
    }
    .st-row-head {
      position: sticky;
      left: 0;
      z-index: 13;
      width: 46px;
      min-width: 46px;
      background: #faf7ff;
      text-align: right;
      padding-right: 10px;
    }
    .st-head-active {
      background: #efe7ff !important;
      color: var(--text-dark) !important;
    }
    .st-resizer-col,
    .st-resizer-row {
      position: absolute;
      z-index: 20;
      background: transparent;
    }
    .st-resizer-col {
      top: 0;
      right: -5px;
      width: 10px;
      height: 100%;
      cursor: col-resize;
    }
    .st-resizer-row {
      left: 0;
      bottom: -5px;
      width: 100%;
      height: 10px;
      cursor: row-resize;
    }
    .st-table td {
      position: relative;
      border: 1px solid #efe5f8;
      padding: 2px 4px;
      vertical-align: middle;
      transition: background 0.1s;
    }
    .st-table td.sel-in { background: #eef4ff; }
    .st-table td.sel-fill { background: #e7f0ff; }
    .st-table td.sel-active {
      position: relative;
      z-index: 5;
      background: #f7fbff;
      outline: 2px solid #60a5fa;
      outline-offset: -2px;
    }
    .st-fill-handle {
      position: absolute;
      right: -1px;
      bottom: -1px;
      width: 8px;
      height: 8px;
      border: 1px solid #fff;
      border-radius: 2px;
      background: #60a5fa;
      cursor: crosshair;
      z-index: 7;
    }
    .st-cell-inner {
      position: relative;
      min-height: 24px;
      height: 100%;
      padding: 2px 4px;
      color: #514867;
      overflow: hidden;
    }
    .st-input {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 24px;
      border: none;
      background: transparent;
      outline: none;
      font: inherit;
      font-size: 12px;
      padding: 0 6px;
      line-height: 24px;
      box-sizing: border-box;
      color-scheme: light;
    }
    .st-input.no-edit {
      color: transparent;
      caret-color: transparent;
      pointer-events: none;
    }
    .st-input.no-edit::selection { background: transparent; }
    .st-cell-select {
      width: 100%;
      height: 24px;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: #514867;
      padding: 0 18px 0 4px;
      cursor: pointer;
      color-scheme: light;
    }
    .st-ghost {
      display: none;
      position: relative;
      z-index: 1;
      height: 24px;
      line-height: 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }
    .st-display {
      height: 24px;
      line-height: 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .st-statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 8px 10px;
      border: 1px solid #eadff6;
      border-radius: 10px;
      background: #fcfaff;
      color: #6d6387;
      font-size: 12px;
    }
    .st-status-main,
    .st-status-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .st-status-pill strong {
      color: var(--text-dark);
      font-weight: 700;
    }
    .autocomplete-popover {
      position: absolute;
      z-index: 40;
      min-width: 220px;
      max-width: 420px;
      max-height: 240px;
      overflow: auto;
      padding: 6px;
      border: 1px solid #eadff6;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 36px rgba(96, 76, 138, 0.16);
      backdrop-filter: blur(6px);
    }
    .autocomplete-popover.hidden {
      display: none !important;
    }
    .autocomplete-item {
      display: flex;
      width: 100%;
      flex-direction: column;
      gap: 2px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      font: inherit;
    }
    .autocomplete-item:hover,
    .autocomplete-item.active {
      background: #f4ecff;
    }
    .autocomplete-item-main {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dark);
    }
    .autocomplete-item-sub {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-toast-layer {
      position: fixed;
      top: 20px;
      left: 50%;
      z-index: 1200;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .app-toast {
      min-width: 280px;
      max-width: min(520px, calc(100vw - 32px));
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid #eadff6;
      box-shadow: 0 18px 42px rgba(96, 76, 138, 0.18);
      color: var(--text-dark);
      font-size: 13px;
      font-weight: 600;
    }
    .app-toast.warning {
      background: #fff8ef;
      border-color: #f3ddbd;
      color: #7f5a2e;
    }
    .app-toast.success {
      background: #f2fbf5;
      border-color: #cfead6;
      color: #2e6a3d;
    }
    .w-72 { width: 72px; }
    .w-120 { width: 120px; }
    .w-90 { width: 90px; }
    .w-170 { width: 170px; }
    .w-70 { width: 70px; }
    .w-100 { width: 100px; }
    .w-110 { width: 110px; }

    /* 거래작업 */
    .workdoc {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .workdoc-top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 240px;
      gap: 10px;
      align-items: start;
    }
    .workdoc-card {
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      padding: 10px;
    }
    .workdoc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .workdoc-head-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .workdoc-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--text-dark);
    }
    @media (max-width: 920px) {
      .workdoc-top { grid-template-columns: 1fr; }
    }
    .workdoc-form {
      display: grid;
      grid-template-columns: 60px 1fr;
      gap: 6px 8px;
      align-items: center;
    }
    .workdoc-label {
      color: var(--muted2);
      font-weight: 600;
      font-size: 11px;
    }
    .workdoc-input {
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 0 8px;
      outline: none;
      font: inherit;
      font-size: 11px;
      color: var(--text);
    }
    .workdoc-input:focus {
      border-color: #c3a7ff;
      box-shadow: 0 0 0 2px #f1e8ff;
    }
    .workdoc-select {
      min-width: 82px;
      cursor: pointer;
    }
    .workdoc-meta {
      display: grid;
      gap: 8px;
    }
    .workdoc-meta-row {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 6px;
      align-items: center;
    }
    .workdoc-meta-row .workdoc-input {
      width: 100%;
    }
    .workdoc-summary {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 2px;
    }
    .workdoc-summary-item {
      border: 1px solid #eadff6;
      border-radius: 8px;
      padding: 6px 8px;
      background: #fcfaff;
    }
    .workdoc-summary-label {
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .workdoc-summary-value {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-dark);
    }
    .st-select {
      appearance: none;
      -webkit-appearance: none;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      padding-right: 24px;
    }
    .items-wrap {
      border-radius: 12px;
      border: 1px solid #e9def5;
      overflow: auto;
      background: #fff;
      max-height: calc(100vh - 270px);
    }
    table.items {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    table.items thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: linear-gradient(90deg, #fff8ea 0%, #f8f1ff 52%, #eef6ff 100%);
      border: 1px solid var(--border);
      padding: 5px 6px;
      text-align: left;
      color: #6d6387;
      font-weight: 700;
    }
    table.items tbody td {
      border: 1px solid #efe5f8;
      padding: 2px 6px;
      height: 26px;
    }
    .cell-input {
      width: 100%;
      height: 22px;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: #514867;
    }
    .items-col-date { width: 84px; }
    .items-col-code { width: 88px; }
    .items-col-name { width: 200px; }
    .items-col-qty { width: 70px; }
    .items-col-price { width: 90px; }
    .items-col-supply { width: 100px; }
    .items-col-tax { width: 80px; }
    .items-col-note { width: 160px; }

    /* 업체리스트 - supplier mode column */
    .clientdoc {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .clientdoc-card {
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      padding: 12px;
    }
    .clientdoc-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .clientdoc-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      color: var(--text-dark);
    }
    .clientdoc-wrap {
      border-radius: 12px;
      border: 1px solid #e9def5;
      overflow: auto;
      background: #fff;
      max-height: calc(100vh - 230px);
    }
    table.clientlist {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 12px;
    }
    table.clientlist thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: linear-gradient(90deg, #fff8ea 0%, #f8f1ff 52%, #eef6ff 100%);
      border: 1px solid var(--border);
      padding: 6px 8px;
      text-align: left;
      color: #6d6387;
      font-weight: 700;
    }
    table.clientlist tbody td {
      border: 1px solid #efe5f8;
      padding: 2px 6px;
      height: 28px;
    }
    .client-input {
      width: 100%;
      height: 24px;
      border: none;
      outline: none;
      background: transparent;
      font: inherit;
      font-size: 12px;
      color: #514867;
    }
    .client-select {
      border: 1px solid #dccdf3;
      border-radius: 6px;
      background: #faf7ff;
      padding: 0 6px;
      cursor: pointer;
    }
    .client-col-name { width: 180px; }
    .client-col-mode { width: 80px; }
    .client-col-biz { width: 150px; }
    .client-col-ceo { width: 110px; }
    .client-col-address { width: 360px; }
    .client-col-type { width: 120px; }
    .client-col-item { width: 140px; }
    .price-layout {
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .price-sidebar {
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 1px 6px rgba(0, 0, 0, 0.06);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .price-client-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 560px;
      overflow: auto;
      padding-right: 2px;
    }
    .price-client-item {
      width: 100%;
      border: 1px solid #eadff6;
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      text-align: left;
      padding: 8px 10px;
      font: inherit;
      cursor: pointer;
    }
    .price-client-item.active {
      border-color: #c3a7ff;
      background: #f6efff;
      color: var(--text-dark);
      font-weight: 700;
    }
    .price-main-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .manage-page {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .manage-toolbar-card,
    .manage-table-card,
    .manage-side-card,

    .statement-toolbar {
      display: flex;

      margin-bottom: 16px;

      width: 210mm;

      margin: 0 auto;
      padding: 3mm 4mm;
      background: #fff;
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);

      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 3mm;
      min-height: calc(297mm - 6mm);
      position: relative;
      align-content: center;
    }
    .statement-stack::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      border-top: 1px dotted #666;
      transform: translateY(-50%);
      pointer-events: none;
